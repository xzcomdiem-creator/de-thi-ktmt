<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi Trắc Nghiệm — Kiến Trúc Máy Tính</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Segoe UI',Arial,sans-serif;
            background: #f0f4f8;
            color: #1a202c;
            min-height: 100vh
        }

        .header {
            background: linear-gradient(135deg,#2b6cb0,#1a365d);
            color: #fff;
            padding: 20px;
            text-align: center
        }

            .header h1 {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 6px
            }

            .header p {
                font-size: 13px;
                opacity: 0.85
            }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px
        }

        /* SETUP */
        #setupScreen {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-top: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08)
        }

            #setupScreen h2 {
                font-size: 17px;
                color: #2b6cb0;
                margin-bottom: 16px;
                text-align: center
            }

        .setup-row {
            margin-bottom: 16px
        }

            .setup-row label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #4a5568;
                margin-bottom: 6px
            }

            .setup-row select, .setup-row input[type=number] {
                width: 100%;
                padding: 10px 12px;
                border: 1.5px solid #cbd5e0;
                border-radius: 10px;
                font-size: 14px;
                color: #2d3748;
                outline: none
            }

                .setup-row select:focus, .setup-row input:focus {
                    border-color: #2b6cb0
                }

        .btn-start {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,#2b6cb0,#1a365d);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px
        }

            .btn-start:active {
                transform: scale(0.98)
            }

        /* QUIZ */
        #quizScreen {
            display: none
        }

        .progress-bar-wrap {
            background: #e2e8f0;
            border-radius: 99px;
            height: 8px;
            margin: 12px 0 4px
        }

        .progress-bar {
            background: linear-gradient(90deg,#2b6cb0,#4299e1);
            height: 8px;
            border-radius: 99px;
            transition: width 0.4s
        }

        .progress-text {
            font-size: 12px;
            color: #718096;
            text-align: right;
            margin-bottom: 12px
        }

        .timer-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px
        }

        .timer-icon {
            font-size: 18px
        }

        .timer-val {
            font-size: 22px;
            font-weight: 700;
            color: #2b6cb0;
            min-width: 48px;
            text-align: center
        }

            .timer-val.warn {
                color: #e53e3e
            }

        .q-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 12px
        }

        .q-num {
            font-size: 11px;
            font-weight: 700;
            color: #4299e1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px
        }

        .q-text {
            font-size: 15px;
            line-height: 1.6;
            color: #1a202c;
            font-weight: 500
        }

        .options {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .opt {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.18s;
            background: #fff
        }

            .opt:active {
                transform: scale(0.98)
            }

            .opt.selected {
                border-color: #2b6cb0;
                background: #ebf8ff
            }

            .opt.correct {
                border-color: #38a169;
                background: #f0fff4
            }

            .opt.wrong {
                border-color: #e53e3e;
                background: #fff5f5
            }

            .opt.show-correct {
                border-color: #38a169;
                background: #f0fff4
            }

        .opt-letter {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #edf2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #4a5568;
            flex-shrink: 0;
            margin-top: 1px
        }

        .opt.selected .opt-letter {
            background: #2b6cb0;
            color: #fff
        }

        .opt.correct .opt-letter {
            background: #38a169;
            color: #fff
        }

        .opt.wrong .opt-letter {
            background: #e53e3e;
            color: #fff
        }

        .opt.show-correct .opt-letter {
            background: #38a169;
            color: #fff
        }

        .opt-text {
            font-size: 13.5px;
            line-height: 1.5;
            color: #2d3748
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            display: none
        }

            .feedback.show {
                display: block
            }

            .feedback.ok {
                background: #f0fff4;
                color: #276749;
                border: 1px solid #c6f6d5
            }

            .feedback.no {
                background: #fff5f5;
                color: #c53030;
                border: 1px solid #fed7d7
            }

        .btn-next {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg,#2b6cb0,#1a365d);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            margin-top: 4px
        }

            .btn-next.show {
                display: block
            }

            .btn-next:active {
                transform: scale(0.98)
            }

        /* RESULT */
        #resultScreen {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-top: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08)
        }

        .result-emoji {
            font-size: 52px;
            text-align: center;
            margin-bottom: 8px
        }

        .result-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px
        }

        .result-score {
            font-size: 40px;
            font-weight: 900;
            text-align: center;
            color: #2b6cb0;
            margin: 12px 0
        }

        .result-sub {
            text-align: center;
            font-size: 14px;
            color: #718096;
            margin-bottom: 20px
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px
        }

        .stat-box {
            background: #f7fafc;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center
        }

        .stat-val {
            font-size: 22px;
            font-weight: 800
        }

            .stat-val.green {
                color: #38a169
            }

            .stat-val.red {
                color: #e53e3e
            }

            .stat-val.blue {
                color: #3182ce
            }

        .stat-lbl {
            font-size: 11px;
            color: #718096;
            margin-top: 3px
        }

        .result-bar-wrap {
            margin-bottom: 20px
        }

        .result-bar-label {
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 6px;
            font-weight: 600
        }

        .result-bar-bg {
            background: #e2e8f0;
            border-radius: 99px;
            height: 14px
        }

        .result-bar-fill {
            height: 14px;
            border-radius: 99px;
            background: linear-gradient(90deg,#38a169,#68d391);
            transition: width 1s
        }

        .grade-badge {
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px
        }

        .btn-retry {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg,#2b6cb0,#1a365d);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px
        }

        .btn-review {
            width: 100%;
            padding: 13px;
            background: #edf2f7;
            color: #2d3748;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer
        }

        /* REVIEW */
        #reviewScreen {
            display: none
        }

        .rev-card {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.07)
        }

        .rev-q {
            font-size: 14px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 10px;
            line-height: 1.5
        }

        .rev-opt {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            align-items: flex-start;
            gap: 8px
        }

            .rev-opt.correct-ans {
                background: #f0fff4;
                border: 1px solid #c6f6d5;
                color: #276749
            }

            .rev-opt.user-wrong {
                background: #fff5f5;
                border: 1px solid #fed7d7;
                color: #c53030
            }

            .rev-opt.neutral {
                background: #f7fafc;
                border: 1px solid #e2e8f0;
                color: #4a5568
            }

        .rev-icon {
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 1px
        }

        .rev-status {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
            margin-bottom: 8px
        }

            .rev-status.ok {
                background: #c6f6d5;
                color: #22543d
            }

            .rev-status.no {
                background: #fed7d7;
                color: #742a2a
            }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: #edf2f7;
            color: #2d3748;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 Kiến Trúc Máy Tính</h1>
        <p>Bài thi trắc nghiệm ôn luyện</p>
    </div>

    <div class="container">

        <!-- SETUP -->
        <div id="setupScreen">
            <h2>⚙️ Cài đặt bài thi</h2>
            <div class="setup-row">
                <label>Số câu hỏi</label>
                <select id="numQ">
                    <option value="10">10 câu</option>
                    <option value="20" selected>20 câu</option>
                    <option value="30">30 câu</option>
                    <option value="50">50 câu</option>
                    <option value="0">Tất cả câu hỏi</option>
                </select>
            </div>
            <div class="setup-row">
                <label>Thời gian mỗi câu (giây)</label>
                <select id="timePerQ">
                    <option value="0">Không giới hạn</option>
                    <option value="20">20 giây</option>
                    <option value="30" selected>30 giây</option>
                    <option value="45">45 giây</option>
                    <option value="60">60 giây</option>
                </select>
            </div>
            <div class="setup-row">
                <label>Chủ đề</label>
                <select id="topicSel">
                    <option value="all">Tất cả chủ đề</option>
                    <option value="cpu">CPU & Thanh ghi</option>
                    <option value="mem">Bộ nhớ</option>
                    <option value="asm">Hợp ngữ (Assembly)</option>
                    <option value="arch">Kiến trúc máy tính</option>
                    <option value="interrupt">Ngắt & Pipeline</option>
                </select>
            </div>
            <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu thi</button>
        </div>

        <!-- QUIZ -->
        <div id="quizScreen">
            <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-text" id="progressText"></div>
            <div class="timer-wrap">
                <span class="timer-icon">⏱️</span>
                <div class="timer-val" id="timerVal">--</div>
            </div>
            <div class="q-card">
                <div class="q-num" id="qNum"></div>
                <div class="q-text" id="qText"></div>
                <div class="options" id="optionsWrap"></div>
                <div class="feedback" id="feedback"></div>
            </div>
            <button class="btn-next" id="btnNext" onclick="nextQ()">Câu tiếp theo →</button>
        </div>

        <!-- RESULT -->
        <div id="resultScreen">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-score" id="resultScore"></div>
            <div class="result-sub" id="resultSub"></div>
            <div class="result-stats">
                <div class="stat-box"><div class="stat-val green" id="rCorrect"></div><div class="stat-lbl">Đúng</div></div>
                <div class="stat-box"><div class="stat-val red" id="rWrong"></div><div class="stat-lbl">Sai</div></div>
                <div class="stat-box"><div class="stat-val blue" id="rTime"></div><div class="stat-lbl">Thời gian</div></div>
            </div>
            <div class="result-bar-wrap">
                <div class="result-bar-label">Tỉ lệ đúng</div>
                <div class="result-bar-bg"><div class="result-bar-fill" id="resultBar"></div></div>
            </div>
            <div class="grade-badge" id="gradeBadge"></div>
            <button class="btn-retry" onclick="retryQuiz()">🔄 Thi lại</button>
            <button class="btn-review" onclick="showReview()">📋 Xem đáp án</button>
        </div>

        <!-- REVIEW -->
        <div id="reviewScreen">
            <div id="reviewContent"></div>
            <button class="btn-back" onclick="backToResult()">← Quay lại kết quả</button>
        </div>

    </div><!-- /container -->

    <script>
        const ALL_QUESTIONS = [
        {t:'arch',q:'Trình tự xử lý thông tin của máy tính là',opts:['CPU → Đĩa cứng → Màn hình','Nhận thông tin → Xử lý thông tin → Xuất thông tin','CPU → Màn hình → Máy in','Bàn phím → CPU → Màn hình'],a:1},
        {t:'arch',q:'Các chức năng cơ bản của máy tính',opts:['Lưu trữ dữ liệu, Chạy chương trình, Nối ghép với thiết bị ngoại vi, Truy nhập bộ nhớ','Trao đổi dữ liệu, Điều khiển, Thực hiện lệnh, Xử lý dữ liệu','Lưu trữ dữ liệu, Xử lý dữ liệu, Trao đổi dữ liệu, Điều khiển','Điều khiển, Lưu trữ dữ liệu, Thực hiện phép toán, Kết nối Internet'],a:2},
        {t:'arch',q:'Các thành phần cơ bản của máy tính',opts:['RAM, CPU, ổ đĩa cứng, Bus liên kết','Hệ thống nhớ, Bus liên kết, ROM, Bàn phím','Hệ thống nhớ, Bộ xử lý, Màn hình, Chuột','Hệ thống nhớ, Bộ xử lý, Hệ thống vào ra, Bus liên kết'],a:3},
        {t:'arch',q:'Máy tính ENIAC là máy tính',opts:['Do Bộ giáo dục Mỹ đặt hàng','Là máy tính ra đời vào những năm 1970','Dùng vi mạch cỡ nhỏ và cỡ vừa','Là máy tính điện tử đầu tiên trên thế giới'],a:3},
        {t:'arch',q:'Một trong các đặc điểm của máy tính John Von Newmann là',opts:['Máy tính có thể hoạt động theo một chương trình đã được lưu trữ','Máy tính có thể điều khiển mọi hoạt động bằng một chương trình duy nhất','Bộ nhớ máy tính không thể địa chỉ hóa được','Mỗi câu lệnh phải có một vùng nhớ chứa địa chỉ lệnh tiếp theo'],a:0},
        {t:'arch',q:'Hai dạng thông tin cơ bản mà bộ nhớ chính (RAM) nạp vào là gì?',opts:['Chỉ thị và dữ liệu của chương trình','Chỉ thị và các giá trị số học của chương trình','Các giá trị thập phân, nhị phân, hexa','Các văn bản và hình ảnh'],a:0},
        {t:'arch',q:'Kiến trúc của máy tính là đề cập đến những điều gì?',opts:['Các thuộc tính logic và cách xây dựng các thuộc tính logic dựa trên tổ chức vật lý','Hình dáng bên ngoài của máy tính bao gồm các thiết bị ngoại vi','Chi tiết các cấu kiện mạch điện tử và nguyên lý hoạt động xử lý','Chi tiết các thành phần phần mềm thực hiện các khả năng computing'],a:0},
        {t:'arch',q:'Phát biểu nào sau đây đúng về kiến trúc Harvard?',opts:['Chỉ thị và dữ liệu không dùng chung bus','Data bus là chung cho cả chỉ thị và dữ liệu','Không có thành phần I/O','Chỉ có thành phần bộ nhớ thứ cấp'],a:0},
        {t:'arch',q:'Đâu là đặc trưng của kiến trúc John Von Neumann',opts:['Chỉ thị và dữ liệu dùng chung bộ nhớ','Có bốn thành phần chính là CPU, I/O, BUS, Memory','Dùng stored-program','Dùng general-purpose hardware'],a:0},
        {t:'arch',q:'Thông tin được lưu trữ và truyền bên trong máy tính dưới dạng',opts:['Mã ASCII','Thập phân','Nhị phân','Kết hợp chữ cái và chữ số'],a:2},
        {t:'arch',q:'Phát biểu nào sau đây là sai về máy tính theo mô hình Harvard?',opts:['Máy tính theo mô hình Harvard không sử dụng khái niệm stored program','Máy tính theo mô hình Harvard có bộ nhớ chương trình và bộ nhớ dữ liệu tách biệt','Máy tính theo mô hình Harvard có thể thực hiện truyền dữ liệu','Máy tính theo mô hình Harvard không có tính năng self modifying code'],a:0},
        {t:'arch',q:'Big endian và little endian là đề cập đến điều gì?',opts:['Thứ tự địa chỉ lưu trữ các byte của một từ nhớ gồm nhiều byte','Quan hệ giữa các byte trong từ nhớ gồm nhiều byte','Qui tắc đánh địa chỉ trong bộ nhớ chính','Giá trị lớn hay nhỏ của địa chỉ lưu trữ dữ liệu'],a:0},
        {t:'arch',q:'Phát biểu nào sau đây là đúng cho trường hợp Little Endian?',opts:['Địa chỉ cao chứa byte có trọng số cao','Địa chỉ cao chứa byte có trọng số thấp','Địa chỉ cao chứa chỉ thị đứng sau','Địa chỉ cao chứa chỉ thị đứng trước'],a:0},
        {t:'arch',q:'Phát biểu nào sau đây là đúng cho trường hợp Big Endian?',opts:['Địa chỉ cao chứa byte có trọng số thấp','Địa chỉ cao chứa dữ liệu lớn','Địa chỉ cao chứa chỉ thị đứng sau','Địa chỉ cao chứa chỉ thị đứng trước'],a:0},
        {t:'arch',q:'Máy tính GPC (general purpose computer) là như thế nào?',opts:['Máy tính có thể thay đổi chức năng tùy vào chương trình','Máy tính được thiết kế để chạy các ứng dụng phổ biến','Máy tính chỉ để cho cá nhân sử dụng','Máy tính chuyên xử lý dữ liệu'],a:0},
        {t:'cpu',q:'CPU là viết tắt của các từ nào?',opts:['Central Processing Unit','Control Processing Unit','Command Program Unit','Counting Program Unit'],a:0},
        {t:'cpu',q:'ALU là viết tắt của các từ nào?',opts:['Arithmetic Logic Unit','Arithmetic Logical Unit','Algorithm Logic Unit','Algorithm Logical Unit'],a:0},
        {t:'cpu',q:'Trong các bộ phận sau, bộ phận nào thuộc bộ xử lý trung tâm?',opts:['Bộ nhớ chính','Đơn vị phối ghép vào ra','Tập các thanh ghi đa năng','Bus hệ thống'],a:2},

        shuffled.forEach((opt,i)=>{
        const div = document.createElement('div');
        div.className = 'opt';
        div.onclick = ()=>selectOpt(div, i);
        div.innerHTML = `<div class="opt-letter">${LETTERS[i]}</div><div class="opt-text">${opt.text}</div>`;
        wrap.appendChild(div);
        });

        // Timer
        clearInterval(timerInterval);
        const tpq = parseInt(document.getElementById('timePerQ').value);
        const tEl = document.getElementById('timerVal');
        if(tpq===0){ tEl.textContent='∞'; tEl.className='timer-val'; return; }
        timeLeft = tpq;
        tEl.textContent = timeLeft;
        tEl.className = 'timer-val';
        timerInterval = setInterval(()=>{
        timeLeft--;
        tEl.textContent = timeLeft;
        if(timeLeft<=5) tEl.className='timer-val warn';
        if(timeLeft<=0){
        clearInterval(timerInterval);
        autoSkip();
        }
        },1000);
        }

        function autoSkip(){
        // mark as wrong (no answer)
        answers.push({q: current, chosen: -1, correct: questions[current]._shuffled.findIndex(s=>s.orig===questions[current].a)});
        const fb = document.getElementById('feedback');
        const correctIdx = questions[current]._shuffled.findIndex(s=>s.orig===questions[current].a);
        document.querySelectorAll('.opt')[correctIdx].classList.add('show-correct');
        fb.textContent = `⏰ Hết giờ! Đáp án đúng: ${LETTERS[correctIdx]}`;
        fb.className = 'feedback show no';
        document.getElementById('btnNext').className = 'btn-next show';
        document.querySelectorAll('.opt').forEach(o=>o.onclick=null);
        }

        function selectOpt(div, idx){
        clearInterval(timerInterval);
        document.querySelectorAll('.opt').forEach(o=>o.onclick=null);
        const q = questions[current];
        const correctShuffledIdx = q._shuffled.findIndex(s=>s.orig===q.a);
        const isCorrect = idx === correctShuffledIdx;
        answers.push({q: current, chosen: idx, correct: correctShuffledIdx});
        div.classList.add(isCorrect?'correct':'wrong');
        if(!isCorrect){
        document.querySelectorAll('.opt')[correctShuffledIdx].classList.add('show-correct');
        }
        if(isCorrect) score++;
        const fb = document.getElementById('feedback');
        fb.textContent = isCorrect ? '✅ Chính xác!' : `❌ Sai! Đáp án đúng là ${LETTERS[correctShuffledIdx]}.`;
        fb.className = 'feedback show '+(isCorrect?'ok':'no');
        document.getElementById('btnNext').className = 'btn-next show';
        }

        function nextQ(){
        current++;
        if(current >= questions.length){ showResult(); return; }
        renderQ();
        }

        function showResult(){
        clearInterval(timerInterval);
        document.getElementById('quizScreen').style.display='none';
        const res = document.getElementById('resultScreen');
        res.style.display='block';
        const pct = Math.round((score/questions.length)*100);
        const elapsed = Math.round((Date.now()-startTime)/1000);
        totalTime = elapsed;
        const mm = Math.floor(elapsed/60), ss = elapsed%60;

        const emojis = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'😅';
        const titles = pct>=90?'Xuất sắc!':pct>=70?'Tốt lắm!':pct>=50?'Khá ổn!':'Cần cố gắng thêm!';
        document.getElementById('resultEmoji').textContent = emojis;
        document.getElementById('resultTitle').textContent = titles;
        document.getElementById('resultScore').textContent = `${score}/${questions.length}`;
        document.getElementById('resultSub').textContent = `Bạn đã trả lời đúng ${score} trong tổng số ${questions.length} câu hỏi`;
        document.getElementById('rCorrect').textContent = score;
        document.getElementById('rWrong').textContent = questions.length-score;
        document.getElementById('rTime').textContent = `${mm}:${String(ss).padStart(2,'0')}`;
        setTimeout(()=>{ document.getElementById('resultBar').style.width=pct+'%'; },100);

        let grade, gbg;
        if(pct>=90){grade='A - Xuất sắc';gbg='background:#f0fff4;color:#276749;border:2px solid #c6f6d5';}
        else if(pct>=80){grade='B - Giỏi';gbg='background:#ebf8ff;color:#1a365d;border:2px solid #bee3f8';}
        else if(pct>=65){grade='C - Khá';gbg='background:#fffbeb;color:#744210;border:2px solid #fef3c7';}
        else if(pct>=50){grade='D - Trung bình';gbg='background:#fff5f5;color:#742a2a;border:2px solid #fed7d7';}
        else{grade='F - Chưa đạt';gbg='background:#fff5f5;color:#c53030;border:2px solid #fc8181';}
        const gb = document.getElementById('gradeBadge');
        gb.textContent = grade;
        gb.style.cssText = gbg;
        }

        function retryQuiz(){
        document.getElementById('resultScreen').style.display='none';
        document.getElementById('setupScreen').style.display='block';
        }

        function showReview(){
        document.getElementById('resultScreen').style.display='none';
        const rev = document.getElementById('reviewScreen');
        rev.style.display='block';
        const rc = document.getElementById('reviewContent');
        rc.innerHTML='';
        answers.forEach((ans,i)=>{
        const q = questions[ans.q];
        const isOk = ans.chosen===ans.correct;
        const card = document.createElement('div');
        card.className='rev-card';
        let html=`<span class="rev-status ${isOk?'ok':'no'}">${isOk?'✅ Đúng':'❌ Sai'}</span>`;
        html+=`<div class="rev-q">${i+1}. ${q.q}</div>`;
        q._shuffled.forEach((opt,j)=>{
        let cls='neutral';
        let icon='○';
        if(j===ans.correct){cls='correct-ans';icon='✓';}
        if(j===ans.chosen && !isOk){cls='user-wrong';icon='✗';}
        html+=`<div class="rev-opt ${cls}"><span class="rev-icon">${icon}</span><span>${LETTERS[j]}. ${opt.text}</span></div>`;
        });
        card.innerHTML=html;
        rc.appendChild(card);
        });
        }

        function backToResult(){
        document.getElementById('reviewScreen').style.display='none';
        document.getElementById('resultScreen').style.display='block';
        }
    </script>
</body>
</html>
